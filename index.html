<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Currency Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root" class="min-h-screen flex items-center justify-center text-gray-400">
        Loading App...
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatCurrencyDisplay = (val) => {
            if (val === '' || val === null || val === undefined) return '';
            const parts = val.toString().split('.');
            let integerPart = parts[0];
            if (integerPart === '') integerPart = '0';
            integerPart = parseInt(integerPart, 10).toLocaleString('id-ID');
            if (parts.length > 1) return `${integerPart},${parts[1]}`;
            return integerPart;
        };

        const parseCurrencyInput = (val) => {
            if (val === '' || val === null || val === undefined) return '';
            const lastComma = val.lastIndexOf(',');
            const lastDot = val.lastIndexOf('.');
            let decimalPos = -1;
            
            if (lastComma > lastDot) {
                decimalPos = lastComma;
            } else if (lastDot > lastComma) {
                const charsAfter = val.length - 1 - lastDot;
                if (charsAfter === 1 || charsAfter === 2 || charsAfter === 0) {
                    decimalPos = lastDot;
                }
            }
            
            if (decimalPos !== -1) {
                const integerPart = val.substring(0, decimalPos).replace(/[^0-9]/g, '');
                const fractionalPart = val.substring(decimalPos + 1).replace(/[^0-9]/g, '');
                return integerPart + '.' + fractionalPart;
            } else {
                return val.replace(/[^0-9]/g, '');
            }
        };

        function App() {
            const [rates, setRates] = useState(null);
            const [prevRates, setPrevRates] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(false);
            const [lastUpdated, setLastUpdated] = useState('');

            const [lastActive, setLastActive] = useState('eur');
            const [eur, setEur] = useState('');
            const [usd, setUsd] = useState('');
            const [idr, setIdr] = useState('');

            const fallbackRates = { 
                eur: { usd: 1.17, idr: 17500 },
                usd: { eur: 0.85, idr: 15000 },
                idr: { eur: 0.000057, usd: 0.000067 }
            };

            const fetchRates = async () => {
                setLoading(true);
                setError(false);
                try {
                    const [resEur, resUsd, resIdr] = await Promise.all([
                        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json'),
                        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json'),
                        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/idr.json')
                    ]);

                    if (!resEur.ok || !resUsd.ok || !resIdr.ok) throw new Error('API down');
                    
                    const dataEur = await resEur.json();
                    const dataUsd = await resUsd.json();
                    const dataIdr = await resIdr.json();
                    
                    const currentRates = { 
                        eur: { usd: dataEur.eur.usd, idr: dataEur.eur.idr },
                        usd: { eur: dataUsd.usd.eur, idr: dataUsd.usd.idr },
                        idr: { eur: dataIdr.idr.eur, usd: dataIdr.idr.usd }
                    };
                    
                    setRates(currentRates);
                    const dateObj = new Date(dataEur.date);
                    setLastUpdated(dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }));

                    const yesterday = new Date(dateObj);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.toISOString().split('T')[0];

                    try {
                        const [prevEur, prevUsd] = await Promise.all([
                            fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${yesterdayStr}/v1/currencies/eur.json`),
                            fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${yesterdayStr}/v1/currencies/usd.json`)
                        ]);
                        if (prevEur.ok && prevUsd.ok) {
                            const prevDataEur = await prevEur.json();
                            const prevDataUsd = await prevUsd.json();
                            setPrevRates({ 
                                eur: { usd: prevDataEur.eur.usd, idr: prevDataEur.eur.idr },
                                usd: { idr: prevDataUsd.usd.idr }
                            });
                        }
                    } catch (e) { }
                    
                    updateInputsSafely(currentRates);
                } catch (err) {
                    setError(true);
                    setRates(fallbackRates);
                    setPrevRates(null);
                    updateInputsSafely(fallbackRates);
                } finally {
                    setTimeout(() => setLoading(false), 500);
                }
            };

            const updateInputsSafely = (ratesToUse) => {
                if (!ratesToUse) return;
                if (lastActive === 'eur' && eur !== '' && eur !== '.') {
                    const num = parseFloat(eur);
                    setUsd((num * ratesToUse.eur.usd).toFixed(2));
                    setIdr(Math.round(num * ratesToUse.eur.idr).toString());
                } else if (lastActive === 'usd' && usd !== '' && usd !== '.') {
                    const num = parseFloat(usd);
                    setEur((num * ratesToUse.usd.eur).toFixed(2));
                    setIdr(Math.round(num * ratesToUse.usd.idr).toString());
                } else if (lastActive === 'idr' && idr !== '' && idr !== '.') {
                    const num = parseFloat(idr);
                    setEur((num * ratesToUse.idr.eur).toFixed(2));
                    setUsd((num * ratesToUse.idr.usd).toFixed(2));
                }
            };

            useEffect(() => { fetchRates(); }, []);

            const handleEurChange = (e) => {
                setLastActive('eur');
                const rawVal = parseCurrencyInput(e.target.value);
                setEur(rawVal);
                if (rawVal === '' || rawVal === '.') { setUsd(''); setIdr(''); return; }
                const num = parseFloat(rawVal);
                if (rates) {
                    setUsd((num * rates.eur.usd).toFixed(2));
                    setIdr(Math.round(num * rates.eur.idr).toString());
                }
            };

            const handleUsdChange = (e) => {
                setLastActive('usd');
                const rawVal = parseCurrencyInput(e.target.value);
                setUsd(rawVal);
                if (rawVal === '' || rawVal === '.') { setEur(''); setIdr(''); return; }
                const num = parseFloat(rawVal);
                if (rates) {
                    setEur((num * rates.usd.eur).toFixed(2));
                    setIdr(Math.round(num * rates.usd.idr).toString());
                }
            };

            const handleIdrChange = (e) => {
                setLastActive('idr');
                const rawVal = parseCurrencyInput(e.target.value);
                setIdr(rawVal);
                if (rawVal === '' || rawVal === '.') { setEur(''); setUsd(''); return; }
                const num = parseFloat(rawVal);
                if (rates) {
                    setEur((num * rates.idr.eur).toFixed(2));
                    setUsd((num * rates.idr.usd).toFixed(2));
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                        <div className="bg-blue-600 p-6 text-white text-center relative">
                            <h1 className="text-2xl font-bold mb-1">Currency Converter</h1>
                            <p className="text-blue-100 text-sm">Live Direct-Source Syncing</p>
                            <button onClick={fetchRates} disabled={loading} className="absolute top-6 right-6 p-2 rounded-full hover:bg-blue-700 transition-colors disabled:opacity-50 text-xl font-bold">
                                {loading ? '...' : '↻'}
                            </button>
                        </div>

                        <div className="p-6 bg-blue-50/50 border-b border-gray-100">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-sm font-bold text-gray-600 uppercase tracking-wider flex items-center gap-2">
                                    ⇆ Live Tick Rates
                                </h2>
                                <span className="text-xs text-gray-500 bg-white px-2 py-1 rounded-full border border-gray-200">
                                    {loading ? 'Updating...' : (error ? 'Offline Mode' : `Updated: ${lastUpdated}`)}
                                </span>
                            </div>

                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                                    <div className="text-xs text-gray-400 font-medium mb-1">EUR → USD</div>
                                    <div className="font-semibold text-gray-700">{rates ? rates.eur.usd.toFixed(4) : '...'}</div>
                                    {rates && prevRates && prevRates.eur && (
                                        <div className={`text-[10px] mt-1 font-medium ${rates.eur.usd >= prevRates.eur.usd ? 'text-green-600' : 'text-red-600'}`}>
                                            {rates.eur.usd >= prevRates.eur.usd ? '▲' : '▼'} {Math.abs(((rates.eur.usd - prevRates.eur.usd) / prevRates.eur.usd) * 100).toFixed(2)}%
                                        </div>
                                    )}
                                </div>
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                                    <div className="text-xs text-gray-400 font-medium mb-1">EUR → IDR</div>
                                    <div className="font-semibold text-gray-700">{rates ? Math.round(rates.eur.idr).toLocaleString('id-ID') : '...'}</div>
                                    {rates && prevRates && prevRates.eur && (
                                        <div className={`text-[10px] mt-1 font-medium ${rates.eur.idr >= prevRates.eur.idr ? 'text-green-600' : 'text-red-600'}`}>
                                            {rates.eur.idr >= prevRates.eur.idr ? '▲' : '▼'} {Math.abs(((rates.eur.idr - prevRates.eur.idr) / prevRates.eur.idr) * 100).toFixed(2)}%
                                        </div>
                                    )}
                                </div>
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                                    <div className="text-xs text-gray-400 font-medium mb-1">USD → IDR</div>
                                    <div className="font-semibold text-gray-700">{rates ? Math.round(rates.usd.idr).toLocaleString('id-ID') : '...'}</div>
                                    {rates && prevRates && prevRates.usd && (
                                        <div className={`text-[10px] mt-1 font-medium ${rates.usd.idr >= prevRates.usd.idr ? 'text-green-600' : 'text-red-600'}`}>
                                            {rates.usd.idr >= prevRates.usd.idr ? '▲' : '▼'} {Math.abs(((rates.usd.idr - prevRates.usd.idr) / prevRates.usd.idr) * 100).toFixed(2)}%
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="p-6 space-y-5">
                            <div className="relative">
                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Value in Euro (€)</label>
                                <div className="relative flex items-center">
                                    <div className="absolute left-4 text-blue-600 font-bold text-xl">€</div>
                                    <input type="text" inputMode="decimal" value={formatCurrencyDisplay(eur)} onChange={handleEurChange} disabled={loading && !rates} placeholder="0,00" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-xl font-medium focus:ring-2 focus:ring-blue-500 outline-none" />
                                </div>
                            </div>

                            <div className="relative">
                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Value in Dollar ($)</label>
                                <div className="relative flex items-center">
                                    <div className="absolute left-4 text-green-600 font-bold text-xl">$</div>
                                    <input type="text" inputMode="decimal" value={formatCurrencyDisplay(usd)} onChange={handleUsdChange} disabled={loading && !rates} placeholder="0,00" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-xl font-medium focus:ring-2 focus:ring-green-500 outline-none" />
                                </div>
                            </div>

                            <div className="relative">
                                <label className="block text-sm font-semibold text-gray-600 mb-2 ml-1">Value in IDR (Rp)</label>
                                <div className="relative flex items-center">
                                    <div className="absolute left-4 text-orange-600 font-bold text-lg">Rp</div>
                                    <input type="text" inputMode="numeric" value={formatCurrencyDisplay(idr)} onChange={handleIdrChange} disabled={loading && !rates} placeholder="0" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-xl font-medium focus:ring-2 focus:ring-orange-500 outline-none" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
